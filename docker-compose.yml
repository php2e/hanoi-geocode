services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: hanoi_geocode
      POSTGRES_USER: hanoi
      POSTGRES_PASSWORD: hanoi
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanoi -d hanoi_geocode"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
